name: Test and Deploy
on:
  push:
    branches:
      - main

job:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
    deploy:
      runs-on: ubuntu-latest
      needs: tests
      steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up Node.js
          uses: actions/setup-node@v2
          with:
            node-version: '16'

        - name: Install dependencies
          run: npm install

        - name: Build the project
          run: npm run build

        - name: Deploy to production server
          run: |
            echo "Deploying to production server..."
            # Add your deployment commands here